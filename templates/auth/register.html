<!DOCTYPE html>
<html lang="{{ lang|default('pt') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t(lang, 'auth.register.title') }} - {{ t(lang, 'app.title') }}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <style>
        :root {
            --primary: #FF8B5A;
            --primary-dark: #FF5A5A;
            --primary-light: #FFD45A;
            --accent: #FFA95A;
            --accent-light: #ffedd8;
            --danger: #FF5A5A;
            --gray-50: #fffaf5;
            --gray-100: #fff1e4;
            --gray-200: #ffd4be;
            --gray-300: #ffb996;
            --gray-400: #d7a18b;
            --gray-500: #8a645b;
            --gray-700: #6a4237;
            --gray-900: #4a2a24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--gray-200) 0%, var(--primary-light) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .register-container {
            width: 100%;
            max-width: 440px;
        }

        .register-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 22px 60px rgba(160, 92, 58, 0.16), 0 8px 25px rgba(160, 92, 58, 0.08);
            padding: 2.5rem;
            text-align: center;
        }

        .register-logo {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
        }

        .register-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.25rem;
        }

        .register-subtitle {
            color: var(--gray-500);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--gray-700);
            font-size: 0.875rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--gray-300);
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 139, 90, 0.2);
        }

        .form-group input::placeholder {
            color: var(--gray-400);
        }

        .form-hint {
            font-size: 0.75rem;
            color: var(--gray-500);
            margin-top: 0.375rem;
        }

        .btn-register {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .btn-register:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 139, 90, 0.3);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .error-message {
            background: #ffe1e1;
            color: #b53333;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.25rem;
            font-size: 0.875rem;
            text-align: left;
        }

        .success-message {
            background: var(--accent-light);
            color: #9a5f1d;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.25rem;
            font-size: 0.875rem;
            text-align: left;
        }

        .login-link {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--gray-200);
            font-size: 0.875rem;
            color: var(--gray-500);
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .lang-switcher {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .lang-switcher a {
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--gray-500);
            transition: all 0.2s;
        }

        .lang-switcher a:hover {
            color: var(--primary);
            background: var(--gray-100);
        }

        .lang-switcher a.active {
            color: white;
            background: var(--primary);
        }

        @media (max-width: 480px) {
            .register-card {
                padding: 2rem 1.5rem;
                border-radius: 0.75rem;
            }

            .register-logo {
                font-size: 3rem;
            }

            .register-title {
                font-size: 1.25rem;
            }

            .form-group input {
                font-size: 16px;
            }

            .btn-register {
                min-height: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-logo">🔬</div>
            <h1 class="register-title">{{ t(lang, 'app.title') }}</h1>
            <p class="register-subtitle">{{ t(lang, 'auth.register.subtitle') }}</p>

            {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/register">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="form-group">
                    <label for="email">{{ t(lang, 'auth.register.email') }}</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="{{ t(lang, 'auth.register.email_placeholder') }}"
                        required
                        autocomplete="email"
                        value="{{ email|default('') }}"
                    >
                </div>

                <div class="form-group">
                    <label for="display_name">{{ t(lang, 'auth.register.display_name') }}</label>
                    <input
                        type="text"
                        id="display_name"
                        name="display_name"
                        placeholder="{{ t(lang, 'auth.register.display_name_placeholder') }}"
                        autocomplete="name"
                        value="{{ display_name|default('') }}"
                    >
                    <p class="form-hint">{{ t(lang, 'auth.register.display_name_hint') }}</p>
                </div>

                <div class="form-group">
                    <label for="password">{{ t(lang, 'auth.register.password') }}</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="{{ t(lang, 'auth.register.password_placeholder') }}"
                        required
                        autocomplete="new-password"
                    >
                    <p class="form-hint">{{ t(lang, 'auth.register.password_hint') }}</p>
                </div>

                <div class="form-group">
                    <label for="password_confirm">{{ t(lang, 'auth.register.password_confirm') }}</label>
                    <input
                        type="password"
                        id="password_confirm"
                        name="password_confirm"
                        placeholder="{{ t(lang, 'auth.register.password_confirm_placeholder') }}"
                        required
                        autocomplete="new-password"
                    >
                </div>

                <button type="submit" class="btn-register">
                    {{ t(lang, 'auth.register.submit') }}
                </button>
            </form>

            <div class="login-link">
                {{ t(lang, 'auth.register.have_account') }}
                <a href="/login">{{ t(lang, 'auth.register.login_link') }}</a>
            </div>

            <div class="lang-switcher">
                <a href="/register?lang=en" class="{% if lang == 'en' %}active{% endif %}">EN</a>
                <a href="/register?lang=pt" class="{% if lang == 'pt' %}active{% endif %}">PT</a>
            </div>
        </div>
    </div>
</body>
</html>
