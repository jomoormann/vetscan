<!DOCTYPE html>
<html lang="{{ lang|default('pt') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t(lang, 'auth.pending.title') }} - {{ t(lang, 'app.title') }}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <style>
        :root {
            --primary: #135E4B;
            --primary-dark: #0d4436;
            --primary-light: #A1D8B5;
            --accent: #4CB572;
            --accent-light: #d4ebe0;
            --warning: #F25016;
            --warning-light: #fef3c7;
            --gray-50: #f7faf8;
            --gray-100: #f0f5f2;
            --gray-200: #CCDCDB;
            --gray-300: #b8ccc9;
            --gray-500: #5f7a74;
            --gray-700: #2d4a44;
            --gray-900: #1a2f2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--gray-200) 0%, var(--primary-light) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .pending-container {
            width: 100%;
            max-width: 440px;
        }

        .pending-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1), 0 8px 25px rgba(0, 0, 0, 0.08);
            padding: 2.5rem;
            text-align: center;
        }

        .pending-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .pending-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .pending-subtitle {
            color: var(--gray-500);
            font-size: 0.875rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .info-box {
            background: var(--warning-light);
            border-radius: 0.5rem;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .info-box h3 {
            color: #92400e;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-box p {
            color: #92400e;
            font-size: 0.875rem;
            line-height: 1.5;
        }

        .email-display {
            background: var(--gray-50);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .email-display label {
            font-size: 0.75rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .email-display p {
            font-size: 1rem;
            color: var(--gray-900);
            font-weight: 500;
            margin-top: 0.25rem;
        }

        .btn-logout {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: var(--gray-100);
            color: var(--gray-700);
            border: 1px solid var(--gray-300);
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: var(--gray-200);
        }

        .lang-switcher {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--gray-200);
        }

        .lang-switcher a {
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--gray-500);
            transition: all 0.2s;
        }

        .lang-switcher a:hover {
            color: var(--primary);
            background: var(--gray-100);
        }

        .lang-switcher a.active {
            color: white;
            background: var(--primary);
        }

        @media (max-width: 480px) {
            .pending-card {
                padding: 2rem 1.5rem;
                border-radius: 0.75rem;
            }

            .pending-icon {
                font-size: 3rem;
            }

            .pending-title {
                font-size: 1.25rem;
            }

            .btn-logout {
                min-height: 48px;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="pending-container">
        <div class="pending-card">
            <div class="pending-icon">⏳</div>
            <h1 class="pending-title">{{ t(lang, 'auth.pending.title') }}</h1>
            <p class="pending-subtitle">{{ t(lang, 'auth.pending.subtitle') }}</p>

            <div class="info-box">
                <h3>📋 {{ t(lang, 'auth.pending.what_next') }}</h3>
                <p>{{ t(lang, 'auth.pending.what_next_description') }}</p>
            </div>

            {% if email %}
            <div class="email-display">
                <label>{{ t(lang, 'auth.pending.registered_email') }}</label>
                <p>{{ email }}</p>
            </div>
            {% endif %}

            <a href="/logout" class="btn-logout">
                {{ t(lang, 'auth.pending.logout') }}
            </a>

            <div class="lang-switcher">
                <a href="/pending-approval?lang=en" class="{% if lang == 'en' %}active{% endif %}">EN</a>
                <a href="/pending-approval?lang=pt" class="{% if lang == 'pt' %}active{% endif %}">PT</a>
            </div>
        </div>
    </div>
</body>
</html>
